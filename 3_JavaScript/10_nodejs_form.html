<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js Form</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #2c3e50; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; margin-top: 5px; font-size: 14px; box-sizing: border-box; }
        button { padding: 10px 20px; margin-top: 20px; font-size: 16px; background: #3498db; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>
    <h1>Contact Form (Node.js Express)</h1>

    <form action="/submit" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit">Submit</button>
    </form>

    <hr style="margin-top: 30px;">
    <h3>GET Request Test</h3>
    <form action="/hello" method="GET">
        <label for="greetName">Your Name:</label>
        <input type="text" id="greetName" name="name">
        <button type="submit">Send GET Request</button>
    </form>
</body>
</html>
