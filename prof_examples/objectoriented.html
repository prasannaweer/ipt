<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Object Oriented Concepts</title>
</head>
<body>
    <h1>Object Oriented Concepts with JavaScript</h1>
    <div id="output"></div>
    <script>
        function print(text) {
            const output = document.getElementById('output');
            const p = document.createElement('p');
            p.textContent = text;
            output.appendChild(p);
        }

        // Encapsulation: private data inside closure
        function createUser(name, password) {
            let secret = password;
            return {
                getName: function() {
                    return name;
                },
                checkPassword: function(value) {
                    return value === secret;
                }
            };
        }

        const user = createUser('Alice', '1234');
        print('Encapsulation: user name = ' + user.getName());
        print('Encapsulation: password valid = ' + user.checkPassword('1234'));

        // Abstraction: expose simple interface for bank account
        function BankAccount(owner, balance) {
            this.owner = owner;
            this.balance = balance;
        }
        BankAccount.prototype.deposit = function(amount) {
            if (amount > 0) {
                this.balance += amount;
            }
        };
        BankAccount.prototype.withdraw = function(amount) {
            if (amount > 0 && amount <= this.balance) {
                this.balance -= amount;
            }
        };
        BankAccount.prototype.getBalance = function() {
            return this.balance;
        };

        const account = new BankAccount('Bob', 100);
        account.deposit(50);
        account.withdraw(30);
        print('Abstraction: account balance = ' + account.getBalance());

        // Inheritance: animal and dog
        function Animal(name) {
            this.name = name;
        }
        Animal.prototype.speak = function() {
            return this.name + ' makes a sound.';
        };

        function Dog(name) {
            Animal.call(this, name);
        }
        Dog.prototype = Object.create(Animal.prototype);
        Dog.prototype.constructor = Dog;
        Dog.prototype.speak = function() {
            return this.name + ' barks.';
        };

        const dog = new Dog('Rex');
        print('Inheritance: ' + dog.speak());

        // Polymorphism: different shapes with same method name
        function Shape() {}
        Shape.prototype.area = function() {
            return 0;
        };

        function Rectangle(width, height) {
            this.width = width;
            this.height = height;
        }
        Rectangle.prototype = Object.create(Shape.prototype);
        Rectangle.prototype.constructor = Rectangle;
        Rectangle.prototype.area = function() {
            return this.width * this.height;
        };

        function Circle(radius) {
            this.radius = radius;
        }
        Circle.prototype = Object.create(Shape.prototype);
        Circle.prototype.constructor = Circle;
        Circle.prototype.area = function() {
            return Math.PI * this.radius * this.radius;
        };

        function logArea(shape) {
            return 'Polymorphism: area = ' + shape.area().toFixed(2);
        }

        const rect = new Rectangle(4, 5);
        const circle = new Circle(3);
        print(logArea(rect));
        print(logArea(circle));
    </script>
</body>
</html>
