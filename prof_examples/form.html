<!DOCTYPE html>
<html>
<head>
  <title>Student Grading App</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input { display: block; margin: 10px 0; padding: 8px; width: 250px; }
    input[type=submit] { width: auto; padding: 8px 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Student Grading App</h1>
  <form action="/result" method="POST">
    <label>Name:</label>
    <input type="text" name="name" required>

    <label>Index Number:</label>
    <input type="text" name="indexNumber" required>

    <label>Maths Marks:</label>
    <input type="number" name="maths" step="0.01" required>

    <label>English Marks:</label>
    <input type="number" name="english" step="0.01" required>

    <label>Sciences Marks:</label>
    <input type="number" name="sciences" step="0.01" required>

    <input type="submit" value="Submit">
  </form>
</body>
</html>
